modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
issueTrackerURL="https://example.invalid/realplace"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="真实置物 (RealPlace)"
description='''真实置物 / RealPlace: place item models as persistent physical world objects.'''

[[mixins]]
config="realplace.mixins.json"

[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="[${neo_version},)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="jade"
type="optional"
versionRange="[15.10.0,)"
ordering="AFTER"
side="CLIENT"
